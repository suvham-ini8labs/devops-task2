apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging

spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory

    email: <your-email-id>

    profile: tlsserver

    privateKeySecretRef:
      name: letsencrypt-staging-acme-account

    solvers:
    - http01:
        ingress:
          ingressClassName: nginx