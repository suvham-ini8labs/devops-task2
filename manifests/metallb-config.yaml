apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: ipaddress-pool
  namespace: metallb-system

spec:
  addresses:
  - 10.0.0.7-10.0.0.8

  autoAssign: true

---

apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: l2-advertisement
  namespace: metallb-system

spec:
  ipAddressPools:
  - ipaddress-pool